<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>新建标签</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F6F3EC; --surface:#FFFDF8; --surface-2:#F0EDE4;
    --line:rgba(34,30,24,0.08); --line-soft:rgba(34,30,24,0.05); --line-strong:rgba(34,30,24,0.14);
    --hover:rgba(34,30,24,0.04);
    --ink-1:#1F1B14; --ink-2:#56524A; --ink-3:#8A8579; --ink-4:#B3AE9F;
    --brand:#2D4636; --brand-soft:#E3E8DF; --brand-ink:#FBFAF6;
    --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:18px;
    --tag-teal:#3F7375; --tag-rust:#A8463A; --tag-clay:#B07A2C; --tag-ochre:#8A7438;
    --tag-sage:#5C7C5A; --tag-slate:#4F6C82; --tag-plum:#7A5A7C; --tag-rose:#9E4F66;
    --font-sans:"Manrope","PingFang SC","Noto Sans SC",system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; background:var(--bg);
    font-family:var(--font-sans); color:var(--ink-1);
    -webkit-font-smoothing:antialiased; font-size:14px;
    display:grid; place-items:center;
  }
  button{font-family:inherit;cursor:pointer;border:0;background:none;padding:0;color:inherit}

  /* ===== Mask + modal ===== */
  .modal-mask{
    position:fixed; inset:0;
    background:rgba(31,27,20,0.42);
    display:grid; place-items:center;
    z-index:100; backdrop-filter:blur(2px);
  }
  .modal{
    width:440px;
    background:var(--surface);
    border-radius:var(--r-xl);
    box-shadow:
      0 1px 2px rgba(31,27,20,.04),
      0 12px 32px rgba(31,27,20,.16),
      0 32px 80px rgba(31,27,20,.12);
    overflow:hidden;
    display:flex; flex-direction:column;
  }

  /* ===== Header ===== */
  .modal-head{padding:18px 22px 4px; display:flex; align-items:baseline; gap:10px}
  .modal-head .t{font-size:16px; font-weight:600; color:var(--ink-1); letter-spacing:-.01em}
  .modal-head .x{
    margin-left:auto; width:26px; height:26px;
    border-radius:var(--r-sm); display:grid; place-items:center; color:var(--ink-3);
  }
  .modal-head .x:hover{background:var(--hover); color:var(--ink-1)}
  .modal-head .x svg{width:14px; height:14px; stroke-width:2}

  /* ===== Body ===== */
  .modal-body{padding:14px 22px 18px; display:flex; flex-direction:column; gap:16px}

  /* Form field */
  .field{display:flex; flex-direction:column; gap:6px}
  .field .lbl{
    font-size:11px; color:var(--ink-3);
    letter-spacing:.12em; text-transform:uppercase; font-weight:600;
  }
  .field input.txt{
    height:36px; padding:0 12px;
    border:1px solid var(--line); border-radius:var(--r-sm);
    background:var(--surface); font-size:13px; color:var(--ink-1);
    outline:none; transition:border-color .12s, box-shadow .12s;
    font-family:inherit;
  }
  .field input.txt:focus{
    border-color:var(--brand);
    box-shadow:0 0 0 3px rgba(45,70,54,.12);
  }
  .field input.txt::placeholder{color:var(--ink-4)}

  /* Type segment */
  .tag-type-seg{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .tag-type-opt{
    border:1px solid var(--line); border-radius:var(--r-md);
    padding:12px; text-align:left;
    display:flex; flex-direction:column; gap:4px;
    background:var(--surface); transition:border-color .12s, background .12s;
  }
  .tag-type-opt:hover{border-color:var(--line-strong)}
  .tag-type-opt .top{
    display:flex; align-items:center; gap:6px;
    font-size:13px; font-weight:600; color:var(--ink-1);
  }
  .tag-type-opt .badge-l{
    font-size:9.5px; font-weight:600;
    padding:1px 5px; border-radius:3px;
    background:var(--surface-2); color:var(--ink-3);
    letter-spacing:.06em; margin-left:auto;
  }
  .tag-type-opt .desc{font-size:11.5px; color:var(--ink-3); line-height:1.4}
  .tag-type-opt.on{border-color:var(--brand); background:var(--brand-soft)}
  .tag-type-opt.on .badge-l{background:var(--brand); color:var(--brand-ink)}

  /* Parent picker (L2 only) */
  .parent-pick{display:flex; flex-wrap:wrap; gap:6px}
  .parent-chip{
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 10px; font-size:12.5px;
    border-radius:var(--r-sm); border:1px solid var(--line);
    background:var(--surface); color:var(--ink-2); font-weight:500;
    transition:border-color .1s, background .1s;
  }
  .parent-chip .d{width:7px; height:7px; border-radius:999px}
  .parent-chip:hover{border-color:var(--line-strong); color:var(--ink-1)}
  .parent-chip.on{border-color:var(--brand); background:var(--brand-soft); color:var(--brand)}

  /* Color swatches (L1 only) */
  .swatches{display:flex; gap:8px; flex-wrap:wrap}
  .sw{
    width:28px; height:28px; border-radius:999px;
    display:grid; place-items:center; position:relative;
    transition:transform .12s;
  }
  .sw::before{
    content:""; position:absolute; inset:-3px;
    border-radius:999px; border:1.5px solid transparent;
    transition:border-color .12s;
  }
  .sw:hover{transform:scale(1.06)}
  .sw.on::before{border-color:var(--ink-1)}
  .sw.on::after{
    content:""; position:absolute;
    width:8px; height:5px;
    border-left:2px solid #fff; border-bottom:2px solid #fff;
    transform:rotate(-45deg) translate(1px,-1px);
  }

  /* Inherit notice (L2 only) */
  .inherit-note{
    display:flex; align-items:center; gap:8px;
    padding:8px 10px; background:var(--surface-2);
    border-radius:var(--r-sm); font-size:11.5px; color:var(--ink-3);
  }
  .inherit-note .pdot{
    width:6px; height:6px; border-radius:999px; flex-shrink:0;
  }
  .inherit-note b{color:var(--ink-1)}

  /* ===== Footer ===== */
  .modal-foot{
    padding:14px 22px;
    border-top:1px solid var(--line-soft);
    background:var(--surface-2);
    display:flex; align-items:center; gap:10px;
  }
  .preview{
    font-size:11.5px; color:var(--ink-3);
    display:inline-flex; align-items:center; gap:6px;
  }
  .preview .dot{width:8px; height:8px; border-radius:999px}
  .preview .pname{color:var(--ink-1); font-weight:500}
  .modal-foot .actions{margin-left:auto; display:flex; gap:8px}
  .btn{
    height:32px; padding:0 14px;
    border-radius:var(--r-sm);
    font-size:12.5px; font-weight:500;
    border:1px solid var(--line);
    background:var(--surface); color:var(--ink-2);
    font-family:inherit;
  }
  .btn:hover{background:var(--hover); color:var(--ink-1)}
  .btn.primary{
    background:var(--brand); color:var(--brand-ink);
    border-color:transparent; font-weight:600;
  }
  .btn.primary:hover{background:#243729}

  /* L2 hides swatches; L1 hides parent picker & inherit note */
  [data-level="L1"] .l2-only{display:none}
  [data-level="L2"] .l1-only{display:none}
</style>
</head>
<body>

<div class="modal-mask">
  <!-- Switch data-level between "L1" / "L2" to toggle -->
  <div class="modal" id="modal" data-level="L2">

    <header class="modal-head">
      <span class="t">新建标签</span>
      <button class="x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </header>

    <div class="modal-body">

      <!-- ===== 标签类型 ===== -->
      <div class="field">
        <span class="lbl">标签类型</span>
        <div class="tag-type-seg">
          <button class="tag-type-opt" data-lv="L1">
            <span class="top">项目标签<span class="badge-l">L1</span></span>
            <span class="desc">一级 · 用于组织月度规划的项目列</span>
          </button>
          <button class="tag-type-opt on" data-lv="L2">
            <span class="top">分类标签<span class="badge-l">L2</span></span>
            <span class="desc">二级 · 属于某个项目，用于细分</span>
          </button>
        </div>
      </div>

      <!-- ===== L2: 父项目选择 ===== -->
      <div class="field l2-only">
        <span class="lbl">所属项目</span>
        <div class="parent-pick" id="parent-pick">
          <button class="parent-chip on" data-id="gzh"    data-tone="teal" >
            <span class="d" style="background:var(--tag-teal)"></span>公众号选题</button>
          <button class="parent-chip"    data-id="kuayan" data-tone="rust" >
            <span class="d" style="background:var(--tag-rust)"></span>快研侠</button>
          <button class="parent-chip"    data-id="xhs"    data-tone="clay" >
            <span class="d" style="background:var(--tag-clay)"></span>小红书创作</button>
          <button class="parent-chip"    data-id="life"   data-tone="ochre">
            <span class="d" style="background:var(--tag-ochre)"></span>生活琐事</button>
        </div>
      </div>

      <!-- ===== 名称 ===== -->
      <div class="field">
        <span class="lbl">标签名称</span>
        <input class="txt" id="name" placeholder="如：选题、写作" />
      </div>

      <!-- ===== L1: 色板 ===== -->
      <div class="field l1-only">
        <span class="lbl">标签颜色</span>
        <div class="swatches" id="swatches">
          <button class="sw on" data-tone="teal"  style="background:var(--tag-teal)"></button>
          <button class="sw"    data-tone="rust"  style="background:var(--tag-rust)"></button>
          <button class="sw"    data-tone="clay"  style="background:var(--tag-clay)"></button>
          <button class="sw"    data-tone="ochre" style="background:var(--tag-ochre)"></button>
          <button class="sw"    data-tone="sage"  style="background:var(--tag-sage)"></button>
          <button class="sw"    data-tone="slate" style="background:var(--tag-slate)"></button>
          <button class="sw"    data-tone="plum"  style="background:var(--tag-plum)"></button>
          <button class="sw"    data-tone="rose"  style="background:var(--tag-rose)"></button>
        </div>
      </div>

      <!-- ===== L2: 继承提示 ===== -->
      <div class="inherit-note l2-only" id="inherit">
        <span class="pdot" style="background:var(--tag-teal)"></span>
        <span>将继承父项目「<b id="parent-name">公众号选题</b>」的色彩</span>
      </div>

    </div>

    <footer class="modal-foot">
      <span class="preview" id="preview">
        <span class="dot" style="background:var(--tag-teal)"></span>
        <span>预览：</span>
        <span class="pname" id="preview-name">公众号选题 / 新分类</span>
      </span>
      <div class="actions">
        <button class="btn">取消</button>
        <button class="btn primary">创建</button>
      </div>
    </footer>

  </div>
</div>

<script>
  const modal = document.getElementById('modal');
  const name  = document.getElementById('name');
  const pName = document.getElementById('preview-name');
  const pDot  = document.querySelector('#preview .dot');
  const inheritDot = document.querySelector('#inherit .pdot');
  const parentName = document.getElementById('parent-name');

  function getParent(){
    const c = document.querySelector('#parent-pick .parent-chip.on');
    return { id: c.dataset.id, tone: c.dataset.tone, name: c.textContent.trim() };
  }
  function getTone(){
    const s = document.querySelector('#swatches .sw.on');
    return s.dataset.tone;
  }
  function update(){
    const lv = modal.dataset.level;
    const tone = lv === 'L1' ? getTone() : getParent().tone;
    pDot.style.background = `var(--tag-${tone})`;
    const n = name.value.trim() || (lv === 'L1' ? '新项目' : '新分类');
    pName.textContent = lv === 'L2' ? `${getParent().name} / ${n}` : n;
    if (lv === 'L2'){
      inheritDot.style.background = `var(--tag-${tone})`;
      parentName.textContent = getParent().name;
    }
  }

  // Type switch
  document.querySelectorAll('.tag-type-opt').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.tag-type-opt').forEach(x => x.classList.toggle('on', x === b));
      modal.dataset.level = b.dataset.lv;
      update();
    });
  });
  // Parent pick
  document.querySelectorAll('#parent-pick .parent-chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('#parent-pick .parent-chip').forEach(x => x.classList.toggle('on', x === c));
      update();
    });
  });
  // Swatch pick
  document.querySelectorAll('#swatches .sw').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('#swatches .sw').forEach(x => x.classList.toggle('on', x === s));
      update();
    });
  });
  name.addEventListener('input', update);
  update();
</script>

</body>
</html>
